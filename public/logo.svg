<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" style="enable-background:new 0 0 40 40;">
  <defs>
    <style>
      .bdo-logo-spin { animation: bdo-spin 8s linear infinite; transform-origin: 20px 20px; }
      @keyframes bdo-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .bdo-logo-spin-rev { animation: bdo-spin-rev 12s linear infinite; transform-origin: 20px 20px; }
      @keyframes bdo-spin-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
      @media (prefers-reduced-motion: reduce) {
        .bdo-logo-spin, .bdo-logo-spin-rev { animation: none; }
      }
    </style>
    <radialGradient id="bdo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0d060" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#c8aa44" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#9c7e2e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="20" cy="20" r="18" fill="url(#bdo-glow)"/>

  <!-- Outer rotating ring with ornate ticks -->
  <g class="bdo-logo-spin">
    <circle cx="20" cy="20" r="17" fill="none" stroke="#c8aa44" stroke-width="0.5" stroke-dasharray="2 1.5" opacity="0.6"/>
    <!-- 8 ornate ticks around the ring -->
    <g fill="#f0d060" opacity="0.7">
      <path d="M20 2 L21 5 L19 5 Z"/>
      <path d="M20 38 L21 35 L19 35 Z"/>
      <path d="M2 20 L5 21 L5 19 Z"/>
      <path d="M38 20 L35 21 L35 19 Z"/>
      <path d="M7.3 7.3 L9.5 8.2 L8.2 9.5 Z" transform="rotate(0 7.3 7.3)"/>
      <path d="M32.7 7.3 L30.5 8.2 L31.8 9.5 Z" transform="rotate(0 32.7 7.3)"/>
      <path d="M7.3 32.7 L9.5 31.8 L8.2 30.5 Z" transform="rotate(0 7.3 32.7)"/>
      <path d="M32.7 32.7 L30.5 31.8 L31.8 30.5 Z" transform="rotate(0 32.7 32.7)"/>
    </g>
  </g>

  <!-- Inner counter-rotating ring -->
  <g class="bdo-logo-spin-rev">
    <circle cx="20" cy="20" r="13" fill="none" stroke="#9c7e2e" stroke-width="0.4" opacity="0.5"/>
    <!-- Occult star (8-pointed) -->
    <path d="M20 7 L22 17 L33 20 L22 23 L20 33 L18 23 L7 20 L18 17 Z" fill="#c8aa44" opacity="0.15"/>
    <path d="M20 7 L22 17 L33 20 L22 23 L20 33 L18 23 L7 20 L18 17 Z" fill="none" stroke="#f0d060" stroke-width="0.4" opacity="0.6"/>
  </g>

  <!-- Center emblem (static) -->
  <circle cx="20" cy="20" r="6" fill="none" stroke="#f0d060" stroke-width="0.6" opacity="0.8"/>
  <circle cx="20" cy="20" r="3" fill="#c8aa44" opacity="0.3"/>
  <!-- Cross in center -->
  <path d="M20 14 L20 26 M14 20 L26 20" stroke="#f0d060" stroke-width="0.5" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="20" cy="20" r="1" fill="#f0d060"/>
</svg>
